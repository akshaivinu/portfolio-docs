<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Akshai Vinu K - Portfolio</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Portfolio of Akshai Vinu K, Full-stack developer with strong UI/UX focus.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Docsify Theme: Dark (VS Code style) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <!-- Custom Styling to make it feel premium & VS Code-like -->
  <style>
    :root {
      --theme-color: #007acc; /* VS Code blue accent */
      --sidebar-width: 260px;
    }
    body {
      font-family: 'Inter', Consolas, "Courier New", monospace;
      background-color: #1e1e1e; /* VS Code pure dark background */
      color: #d4d4d4;
      line-height: 1.6;
    }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.02em;
    }
    .markdown-section h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }
    .markdown-section h2 {
      font-size: 1.75rem;
      border-bottom: 1px solid #333333;
      padding-bottom: 0.5rem;
      margin-top: 3rem;
    }
    
    /* Sidebar styling: Matches VS Code File Explorer */
    .sidebar {
      background-color: #252526; /* VS Code sidebar dark grey */
      border-right: 1px solid #333333;
      padding-top: 1rem;
    }
    .sidebar h1 {
      font-weight: 700;
      font-size: 1rem;
      color: #cccccc;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sidebar-nav ul li a {
      color: #cccccc;
      font-size: 0.9rem;
      font-weight: normal;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      padding: 4px 8px;
    }
    .sidebar-nav a:hover {
      background-color: #37373d; /* VS Code hover highlight */
      color: #ffffff;
      border-radius: 4px;
      text-decoration: none;
    }
    .sidebar-nav ul li.active > a {
      background-color: #37373d;
      color: #ffffff;
      border-left: 2px solid var(--theme-color);
      border-radius: 2px;
    }
    .sidebar-toggle {
      background: transparent;
    }

    /* Remove default docsify list bullets in sidebar for cleaner file tree look */
    .sidebar-nav ul {
      list-style-type: none;
      padding-left: 1rem;
    }
    .sidebar-nav > ul {
      padding-left: 0;
    }
    
    /* Content styling */
    .markdown-section a {
      color: #4daafc; /* Light blue links */
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .markdown-section a:hover {
      text-decoration: underline;
      color: #7cd6fa;
    }
    .markdown-section pre {
      background-color: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 6px;
    }
    .markdown-section code {
      color: #ce9178; /* VS Code orange-ish string color */
      font-family: Consolas, 'Fira Code', monospace;
    }
    .markdown-section p code, .markdown-section li code {
      background-color: #2d2d30;
      color: #9cdcfe; /* VS Code light blue variable color */
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.875em;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      color: #999999;
      background: #252526;
      padding: 1rem 1.5rem;
      border-radius: 0 4px 4px 0;
      margin: 1.5rem 0;
    }
    
    /* Custom Badge Styles */
    .badge {
      display: inline-block;
      padding: 0.35em 0.7em;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      vertical-align: baseline;
      border-radius: 4px; /* Squarer badges for VS code look */
      background-color: #333333;
      color: #ffffff;
      margin-right: 0.5em;
      margin-bottom: 0.5em;
      border: 1px solid #444444;
    }
    .badge-primary { background-color: #0e639c; color: #ffffff; border-color: #1177bb; }
    .badge-success { background-color: #0d3a1e; color: #ffffff; border-color: #156230; }
  </style>
</head>
<body>
  <div id="app">Loading portfolio...</div>
  <script>
    window.$docsify = {
      name: 'Akshai Vinu K',
      repo: '', // Add your GitHub repo URL here to show a GitHub corner snippet
      loadSidebar: true,
      subMaxLevel: 2, // Auto-generates sidebar links from h2 headers
      auto2top: true, // Smooth scroll to top when changing routes
      themeColor: '#0f172a',
      
      // Search Plugin Configuration
      search: {
        maxAge: 86400000, // Expiration time in ms (1 day)
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No Results Found',
        depth: 2,
        hideOtherSidebarContent: false,
      },
      
      // Pagination Plugin
      pagination: {
        previousText: 'Previous Page',
        nextText: 'Next Page',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>
  
  <!-- Core Docsify Script -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <!-- Zoom Image Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <!-- Copy to Clipboard Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Pagination Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
