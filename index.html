<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Akshai Vinu K - GitHub Style Portfolio</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Base Docsify Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --theme-color: #58a6ff; /* GitHub Link Blue */
      --sidebar-width: 320px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: #0d1117; /* GitHub Dark BG */
      color: #c9d1d9; /* GitHub Text Color */
    }
    
    /* Markdown overrides */
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 {
      color: #c9d1d9;
      font-weight: 600;
      border-bottom: none;
    }
    .markdown-section h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #21262d; margin-bottom: 16px; margin-top: 24px; }
    .markdown-section h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #21262d; margin-top: 24px; margin-bottom: 16px; }
    .markdown-section h3 { font-size: 1.25em; margin-top: 24px; }
    
    .markdown-section a {
      color: #58a6ff;
      text-decoration: none;
    }
    .markdown-section a:hover {
      text-decoration: underline;
    }
    .markdown-section hr { height: 1px; padding: 0; margin: 24px 0; background-color: #21262d; border: 0; }
    
    .markdown-section strong {
      color: #c9d1d9;
    }
    
    /* Sidebar (Left profile section) */
    .sidebar {
      background-color: #0d1117;
      border-right: 1px solid #21262d;
      padding: 32px 24px;
    }
    .sidebar-nav {
      margin-top: 24px;
    }
    .sidebar-nav ul {
      list-style-type: none;
      padding: 0;
    }
    .sidebar-nav li {
      margin: 6px 0;
    }
    .sidebar-nav a {
      color: #c9d1d9;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      display: block;
      transition: background 0.1s;
    }
    .sidebar-nav a:hover {
      background-color: #161b22;
      text-decoration: none;
    }
    .sidebar-nav li.active > a {
      background-color: #1f6feb;
      color: #ffffff;
      font-weight: 600;
      border-left: none; /* remove docsify native border */
    }
    
    /* Code and blocks */
    .markdown-section pre {
      background-color: #161b22;
      border-radius: 6px;
      border: 1px solid #30363d;
    }
    .markdown-section code {
      color: #c9d1d9;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    }
    .markdown-section p code, .markdown-section li code {
      background-color: rgba(110,118,129,0.4);
      padding: 0.2em 0.4em;
      border-radius: 6px;
    }
    .markdown-section blockquote {
      border-left: 0.25em solid #30363d;
      color: #8b949e;
      background: transparent;
      padding: 0 1em;
      margin: 0;
    }
    
    /* Repo Grid layout for Projects */
    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
      margin-top: 16px;
      margin-bottom: 30px;
    }
    .repo-card {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      background-color: #0d1117;
      display: flex;
      flex-direction: column;
    }
    .repo-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .repo-card-title a {
      color: #58a6ff;
      text-decoration: none;
    }
    .repo-card-desc {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 16px;
      flex-grow: 1;
    }
    .repo-card-stats {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .language-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 4px;
    }
    
    /* Tech Badges */
    .badge {
      display: inline-block;
      padding: 0.2em 0.8em;
      font-size: 12px;
      font-weight: 500;
      border-radius: 2em;
      border: 1px solid #30363d;
      color: #8b949e;
      margin-right: 6px;
      background-color: transparent;
    }

    /* GitHub Profile Edit Button Lookalike */
    .gh-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 5px 16px;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      color: #c9d1d9;
      background-color: #21262d;
      border: 1px solid rgba(240,246,252,0.1);
      border-radius: 6px;
      cursor: pointer;
      margin-top: 16px;
      text-decoration: none!important;
    }
    .gh-btn:hover {
      background-color: #30363d;
      border-color: rgba(240,246,252,0.1);
    }
  </style>
</head>
<body>
  <div id="app">Loading portfolio...</div>
  <script>
    window.$docsify = {
      name: 'Akshai Vinu K',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0, // Disable auto h2 generation for cleaner UI sidebar
      auto2top: true,
      themeColor: '#58a6ff',
      search: {
        paths: 'auto',
        placeholder: 'Search repositories...',
        noData: 'No Results',
        depth: 2
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
